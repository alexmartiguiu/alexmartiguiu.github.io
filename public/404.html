<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    (function() {
      const path = window.location.pathname;
      const query = window.location.search.slice(1).replace(/&/g, '~and~');
      const newUrl = '/?p=' + encodeURIComponent(path) + (query ? '&q=' + query : '') + window.location.hash;
      window.location.replace(newUrl);
    })();
  </script>
</head>
<body></body>
</html>
