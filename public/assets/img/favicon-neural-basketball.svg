<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Basketball sphere -->
  <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <path d="M 12 2 Q 12 12 12 22" stroke="currentColor" stroke-width="1.5"/>
  <path d="M 2 12 Q 12 12 22 12" stroke="currentColor" stroke-width="1.5"/>
  
  <!-- Neural network nodes overlaid on basketball -->
  <circle cx="6" cy="6" r="1.5" fill="currentColor"/>
  <circle cx="18" cy="6" r="1.5" fill="currentColor"/>
  <circle cx="12" cy="12" r="2" fill="currentColor"/>
  <circle cx="6" cy="18" r="1.5" fill="currentColor"/>
  <circle cx="18" cy="18" r="1.5" fill="currentColor"/>
  
  <!-- Neural connections -->
  <line x1="6" y1="6" x2="12" y2="12" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
  <line x1="18" y1="6" x2="12" y2="12" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
  <line x1="6" y1="18" x2="12" y2="12" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
  <line x1="18" y1="18" x2="12" y2="12" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
  <line x1="6" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
  <line x1="18" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
</svg>