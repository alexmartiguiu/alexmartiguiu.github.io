<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <!-- Geometric hexagon with data flow -->
  <path d="M 12 2 L 20 6 L 20 14 L 12 18 L 4 14 L 4 6 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
  
  <!-- Inner circles representing data nodes -->
  <circle cx="12" cy="10" r="1.5" fill="currentColor"/>
  <circle cx="8" cy="8" r="1" fill="currentColor" opacity="0.6"/>
  <circle cx="16" cy="8" r="1" fill="currentColor" opacity="0.6"/>
  <circle cx="8" cy="13" r="1" fill="currentColor" opacity="0.6"/>
  <circle cx="16" cy="13" r="1" fill="currentColor" opacity="0.6"/>
  
  <!-- Connecting lines -->
  <line x1="12" y1="10" x2="8" y2="8" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
  <line x1="12" y1="10" x2="16" y2="8" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
  <line x1="12" y1="10" x2="8" y2="13" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
  <line x1="12" y1="10" x2="16" y2="13" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
</svg>